    application:"In work: leaders who can be genuinely moved by their team's struggles and successes create loyalty that compensation cannot buy. In daily life: let music, nature, and beauty actually touch you — not as content to consume but as experience to receive. In relationships: Gan is the capacity for genuine empathy — not performed sympathy, but actual resonance with another person's inner state."
  },
  {
    pinyin:"Gui", hanzi:"歸", english:"Return / Homecoming", tag:"state",
    quote:"Returning to the root is called stillness. Returning to one's destiny is called the eternal. — Ch. 16",
    teaching:"Gui is the movement of return — not regression, but a cyclical homecoming. Chapter 16 uses the imagery of vegetation: all things grow outward, flourish, then return to the root from which they came. This is not tragedy; it is completion. Lao Tzu frames return as the gateway to the eternal — the willingness to release, to come back to center, to begin again from groundedness, is the path to wisdom. Return is always available.",
    application:"In work: after every major project or season of intensity, build in a return — a period of reflection and reset before charging forward again. In daily life: spiritual practice is fundamentally Gui — returning again and again to breath, to the present moment, to what actually matters. In relationships: the capacity to repair — to return to warmth after conflict — is one of the most important skills. Gui makes repair possible."
  },
  {
    pinyin:"Ding", hanzi:"定", english:"Stability / Groundedness", tag:"state",
    quote:"Do you have the patience to wait until your mud settles and the water is clear? — Ch. 15",
    teaching:"Chapter 15 describes the ancient masters through paradoxical images — crossing ice, watching strangers, melting like ice. But the central teaching is Ding: the capacity to wait for clarity rather than forcing a decision through murky water. Ding is not rigidity — it is the groundedness that allows you to function without being swept away by urgency, panic, or the pressure of others' expectations. You cannot clear muddy water by stirring it harder.",
    application:"In work: the most expensive decisions in business are often those made in panic or in the heat of a moment. Ding is the pause before the irreversible email, the breath before the difficult conversation. In daily life: stability in the body creates stability in mind — they are not separate. In relationships: the person who can remain grounded during a partner's emotional storm is practicing Ding — one of the most stabilizing gifts you can offer."
  },
  {
    pinyin:"Zi Ran", hanzi:"自然", english:"Naturalness / Self-so", tag:"nature",
    quote:"Humanity follows Earth. Earth follows Heaven. Heaven follows the Tao. The Tao follows its own nature. — Ch. 25",
    teaching:"Zi Ran literally means 'self-so' — that which is so by itself, without external cause or forcing. It is Lao Tzu's ultimate authority: the Tao does not follow rules or gods or ideals. It simply is what it naturally is. The practical teaching is that authenticity — being what you actually are, rather than performing what you think you should be — is the human expression of Zi Ran.",
    application:"In work: organizations that grow naturally from a genuine purpose outperform those built to chase metrics. In daily life: notice when you are being Zi Ran — natural, easy, unperformed — versus when you are executing a role. In relationships: the most sustaining connections are those where both people can be self-so — without editing, without performance."
  },
  {
    pinyin:"You", hanzi:"遊", english:"Wandering / Purposeless Roaming", tag:"nature",
    quote:"The Tao is like an empty vessel that yet may be drawn from without ever needing to be filled. How still it is, how deep — the ancestor of all things. — Ch. 4",
    teaching:"You is the Taoist ideal of movement without goal — not aimlessness born of confusion, but the ease of moving through life without forcing a destination. The Chuang Tzu uses You extensively: the sage wanders, the fish swims, the bird flies — each perfectly expressing its nature without striving. You is what children do naturally in unstructured play. It is attention without agenda.",
    application:"In daily life: build purposeless time into your week — genuine open wandering, whether physical (walking without destination) or mental (reading without a reason). In work: the brainstorm that wanders beyond its brief often finds the best idea. Over-facilitated ideation sessions lose You. In relationships: the couple that can be together without agenda — no task, no conversation goal — has something rare and durable."
  },
  {
    pinyin:"Shi", hanzi:"時", english:"Time / The Right Moment", tag:"nature",
    quote:"To everything there is a season. The sage does not rush, does not lag. Moving with the moment is the Tao. — Ch. 8 (contextual)",
    teaching:"Shi is temporal wisdom — not just time management, but the Taoist sense of kairos: the right action at the right moment. Lao Tzu consistently implies that much suffering comes from acting at the wrong time — forcing spring in winter, rushing harvest, speaking when silence is needed. Wisdom involves reading cycles accurately. Shi requires both patience (not forcing before the moment is ripe) and decisiveness (not hesitating when the moment arrives).",
    application:"In work: timing is the underrated variable in most strategic decisions. The right move at the wrong time fails; the same move at the right time succeeds. In daily life: honor the natural rhythms of your energy, your season of life, and the relational timing of conversations. In relationships: the conversation that fails in anger often succeeds after rest. Shi is knowing the difference."
  }
];

const tagStyles = {
  core:     { color:'#7a9e6e', bg:'rgba(122,158,110,0.08)', label:'Core Tao' },
  polarity: { color:'#8a6eb0', bg:'rgba(138,110,176,0.08)', label:'Polarity' },
  state:    { color:'#b08a4a', bg:'rgba(176,138,74,0.08)',  label:'Inner State' },
  nature:   { color:'#5e8aa0', bg:'rgba(94,138,160,0.08)', label:'Nature' }
};

let activeFilter = 'all';
let allExpanded = false;

function render() {
  const container = document.getElementById('cards');
  const filtered = activeFilter === 'all' ? data : data.filter(d => d.tag === activeFilter);
  container.innerHTML = filtered.map((d, i) => {
    const ts = tagStyles[d.tag];
    return `
    <div class="card" id="card-${i}">
      <div class="card-header" onclick="toggle(${i})">
        <div class="hanzi">${d.hanzi}</div>
        <div class="header-text">
          <div class="pinyin">${d.pinyin}</div>
          <div class="english-title">${d.english}</div>
        </div>
        <span class="tag" style="color:${ts.color};background:${ts.bg};border-color:${ts.color}40">${ts.label}</span>
        <span class="chevron">▾</span>
      </div>
      <div class="card-body">
        <div class="section">
          <div class="section-label">Quote — Tao Te Ching</div>
          <div class="quote-text">${d.quote}</div>
        </div>
        <div class="section">
          <div class="section-label">Teaching</div>
          <div class="body-text">${d.teaching}</div>
        </div>
        <div class="section">
          <div class="section-label">Modern Application</div>
          <div class="body-text">${d.application}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(i) {
  document.getElementById('card-' + i).classList.toggle('open');
}

function filter(tag, btn) {
  activeFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  allExpanded = false;
  render();
}

function toggleAll() {
  allExpanded = !allExpanded;
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('open', allExpanded));
  document.querySelector('.expand-btn').textContent = allExpanded ? 'Collapse all' : 'Expand all';
}

function copyMarkdown() {
  const header = '| Pinyin | 字 | English | Tao Te Ching Quote | Teaching | Modern Application |\n|--------|-----|---------|-------------------|----------|-------------------|\n';
  const rows = data.map(d =>
    `| **${d.pinyin}** | ${d.hanzi} | ${d.english} | ${d.quote.replace(/\n/g,' ')} | ${d.teaching.replace(/\n/g,' ')} | ${d.application.replace(/\n/g,' ')} |`
  ).join('\n');
  navigator.clipboard.writeText(header + rows).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy as markdown'; btn.classList.remove('copied'); }, 2500);
  });
}

render();
</script>
</body>
</html>
